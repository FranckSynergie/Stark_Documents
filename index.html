<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STARK DOCS">
  <title>STARK VARG — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E8150A;
      --red-dim: #a00f07;
      --black: #080808;
      --dark: #111;
      --card: #181818;
      --border: #282828;
      --text: #e8e8e8;
      --muted: #777;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* BG GRID */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,21,10,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,21,10,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* DIAGONAL ACCENT */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      right: -15%;
      width: 55vw;
      height: 120vh;
      background: linear-gradient(135deg, transparent 40%, rgba(232,21,10,.03) 100%);
      transform: skewX(-12deg);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 2;
      animation: fadeUp .4s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* LOGO */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .bolt-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px; height: 60px;
      background: var(--red);
      clip-path: polygon(12% 0%, 88% 0%, 100% 12%, 100% 88%, 88% 100%, 12% 100%, 0% 88%, 0% 12%);
      margin-bottom: 16px;
      box-shadow: 0 0 40px rgba(232,21,10,.3);
    }

    .bolt-wrap svg { width: 32px; height: 32px; fill: white; }

    .brand h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 4px;
      color: #fff;
      line-height: 1;
    }

    .brand p {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* CARD */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: #111;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 14px 16px;
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
      -webkit-appearance: none;
    }

    .field input:focus { border-color: var(--red); }

    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); font-size: 18px;
      cursor: pointer; padding: 4px;
    }

    .btn-login {
      width: 100%;
      background: var(--red);
      border: none;
      border-radius: 7px;
      padding: 15px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      color: white;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, transform .1s;
      position: relative;
      overflow: hidden;
    }

    .btn-login:active { background: var(--red-dim); transform: scale(.98); }

    .btn-login.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.15) 50%, transparent 100%);
      animation: shimmer .8s infinite;
    }

    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* ERROR */
    .error-box {
      display: none;
      margin-top: 14px;
      background: rgba(232,21,10,.1);
      border: 1px solid rgba(232,21,10,.3);
      border-radius: 7px;
      padding: 12px 14px;
      font-size: 13px;
      color: #ff6b65;
      text-align: center;
    }

    /* FOOTER */
    .foot {
      text-align: center;
      margin-top: 28px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: #333;
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="bolt-wrap">
      <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <h1>STARK VARG</h1>
    <p>Documentation &amp; Support</p>
  </div>

  <div class="card">
    <div class="card-title">Accès sécurisé</div>

    <div class="field">
      <label>Identifiant</label>
      <input type="text" id="userId" placeholder="votre identifiant" autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>

    <div class="field">
      <label>Mot de passe</label>
      <div class="pw-wrap">
        <input type="password" id="userPwd" placeholder="••••••••" autocomplete="current-password" id="pwdInput">
        <button class="pw-toggle" onclick="togglePwd()" type="button" tabindex="-1">👁</button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">CONNEXION</button>

    <div class="error-box" id="errorBox">Identifiant ou mot de passe incorrect</div>
  </div>

  <div class="foot">STARK FUTURE — starkfuture.com</div>
</div>

<script>
  const SALT = 'stark_salt_2025';
  const USERS_URL = 'users.json';

  // SHA-256 via Web Crypto API
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // Si déjà connecté → redirect direct
  window.addEventListener('DOMContentLoaded', () => {
    const sess = sessionStorage.getItem('stark_user');
    if (sess) { window.location.href = 'app.html'; }

    // Enter key
    document.getElementById('userPwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('userId').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('userPwd').focus();
    });
  });

  function togglePwd() {
    const inp = document.getElementById('userPwd');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function doLogin() {
    const id  = document.getElementById('userId').value.trim().toLowerCase();
    const pwd = document.getElementById('userPwd').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorBox');

    if (!id || !pwd) { showError('Remplis les deux champs.'); return; }

    btn.classList.add('loading');
    btn.disabled = true;
    err.style.display = 'none';

    try {
      const hash = await sha256(pwd + SALT);
      const res  = await fetch(USERS_URL + '?v=' + Date.now());
      const users = await res.json();

      const match = users.find(u => u.id === id && u.password === hash);

      if (match) {
        sessionStorage.setItem('stark_user', JSON.stringify({ id: match.id, name: match.name, role: match.role }));
        window.location.href = 'app.html';
      } else {
        showError('Identifiant ou mot de passe incorrect.');
      }
    } catch (e) {
      showError('Erreur de chargement. Vérifie ta connexion.');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorBox');
    err.textContent = msg;
    err.style.display = 'block';
    document.getElementById('userPwd').value = '';
    document.getElementById('userPwd').focus();
  }
</script>
</body>
</html>
