<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STARK DOCS">
  <title>STARK VARG — Documentation</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E8150A;
      --red-dim: #a00f07;
      --black: #0a0a0a;
      --dark: #111111;
      --card: #181818;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --hit: #1e1e1e;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:var(--black); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      border-bottom: 2px solid var(--red);
      padding: 13px 16px 11px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo-badge {
      width: 38px; height: 38px;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
      clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
      flex-shrink: 0;
    }
    .logo-badge svg { width: 20px; height: 20px; fill: white; }
    .header-text { flex: 1; }
    .header-text h1 { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; line-height:1; color:#fff; }
    .header-text p  { font-family:'Barlow Condensed',sans-serif; font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:1px; }
    .model-pill {
      display: flex; align-items: center; gap: 6px;
      background: rgba(232,21,10,.15); border: 1px solid rgba(232,21,10,.4);
      border-radius: 20px; padding: 4px 10px 4px 8px;
      cursor: pointer;
    }
    .model-pill-dot { width:6px; height:6px; background:var(--red); border-radius:50%; }
    .model-pill-name { font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:1px; color:var(--red); font-weight:600; }
    .user-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 10px 5px 8px;
    }
    .user-dot { width:7px; height:7px; background:#4caf50; border-radius:50%; }
    .user-name { font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:1px; color:var(--muted); }
    .btn-logout {
      background: none; border: none;
      color: var(--muted); font-size: 20px;
      cursor: pointer; padding: 4px 6px; line-height: 1;
    }

    /* ── MODEL SELECTOR OVERLAY ── */
    #modelOverlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--black);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      animation: fadeIn .3s ease;
    }
    #modelOverlay.hidden { display: none; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .model-brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .model-bolt {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px;
      background: var(--red);
      clip-path: polygon(12% 0%, 88% 0%, 100% 12%, 100% 88%, 88% 100%, 12% 100%, 0% 88%, 0% 12%);
      margin-bottom: 16px;
      box-shadow: 0 0 50px rgba(232,21,10,.35);
    }
    .model-bolt svg { width: 32px; height: 32px; fill: white; }
    .model-brand h1 {
      font-family:'Bebas Neue',sans-serif; font-size:42px;
      letter-spacing:5px; color:#fff; line-height:1;
    }
    .model-brand p {
      font-family:'Barlow Condensed',sans-serif; font-size:13px;
      letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-top:6px;
    }

    .model-label {
      font-family:'Barlow Condensed',sans-serif; font-size:11px;
      letter-spacing:2.5px; text-transform:uppercase; color:var(--muted);
      margin-bottom:20px; text-align:center;
    }

    .model-grid {
      width: 100%; max-width: 400px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .model-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 22px 16px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: border-color .15s, background .15s, transform .1s;
      text-align: center;
    }
    .model-btn:active { transform: scale(.97); }
    .model-btn:hover { border-color: var(--red); background: var(--hit); }

    .model-btn-tag {
      font-family:'Bebas Neue',sans-serif; font-size:28px;
      letter-spacing:2px; color:#fff; line-height:1;
    }
    .model-btn-sub {
      font-family:'Barlow Condensed',sans-serif; font-size:10px;
      letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
    }
    .model-btn-badge {
      background: var(--red); border-radius:4px;
      padding: 2px 8px;
      font-family:'Barlow Condensed',sans-serif; font-size:10px;
      letter-spacing:1px; color:#fff; text-transform:uppercase;
    }

    /* ── SEARCH ── */
    .search-section { padding: 18px 16px 10px; }
    .search-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:9px; }
    .search-wrap { display:flex; gap:8px; align-items:stretch; }
    #searchInput {
      flex:1; background:var(--card); border:1.5px solid var(--border);
      border-radius:6px; padding:13px 16px;
      font-family:'Barlow',sans-serif; font-size:16px; color:var(--text);
      outline:none; transition:border-color .2s; -webkit-appearance:none;
    }
    #searchInput:focus { border-color:var(--red); }
    #searchInput::placeholder { color:#555; }
    #clearBtn { display:none; background:var(--border); border:none; border-radius:6px; padding:0 14px; color:var(--muted); font-size:18px; cursor:pointer; }

    /* ── RESULT ── */
    #resultBox { margin:10px 16px 4px; display:none; }
    .result-card {
      background:var(--hit); border:1.5px solid var(--red);
      border-radius:8px; padding:14px 16px;
      animation: slideIn .18s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .result-cat { font-family:'Barlow Condensed',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--red); margin-bottom:3px; }
    .result-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; color:#fff; margin-bottom:5px; }
    .result-desc { font-size:13px; color:#aaa; margin-bottom:12px; line-height:1.4; }
    .result-links { display:flex; flex-direction:column; gap:8px; }
    .result-link {
      display:flex; align-items:center; gap:10px;
      background:var(--black); border:1px solid var(--border);
      border-radius:6px; padding:11px 14px;
      color:var(--text); text-decoration:none; font-size:14px; font-weight:600;
      transition:background .15s, border-color .15s;
    }
    .result-link:active { background:var(--red-dim); border-color:var(--red); }
    .link-icon { width:28px; height:28px; background:var(--red); border-radius:4px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .link-icon svg { width:15px; height:15px; fill:white; }
    .link-meta { display:flex; flex-direction:column; }
    .link-name { font-size:14px; font-weight:700; color:#fff; }
    .link-type { font-size:11px; color:var(--muted); font-weight:400; }
    .no-result { background:var(--card); border:1.5px solid var(--border); border-radius:8px; padding:18px 16px; text-align:center; }
    .no-result p { color:var(--muted); font-size:14px; }
    .no-result strong { color:var(--red); }

    /* ── CHIPS ── */
    .section-title { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); padding:14px 16px 8px; }
    .chips-wrap { padding:0 16px 10px; display:flex; flex-wrap:wrap; gap:8px; }
    .chip {
      background:var(--card); border:1px solid var(--border);
      border-radius:20px; padding:7px 14px;
      font-size:13px; font-family:'Barlow Condensed',sans-serif; letter-spacing:.5px;
      color:var(--text); cursor:pointer;
      transition:background .15s, border-color .15s, color .15s; user-select:none;
    }
    .chip:active, .chip.active { background:var(--red); border-color:var(--red); color:#fff; }

    /* ── DOCS LIST ── */
    .links-grid { padding:0 16px 40px; display:flex; flex-direction:column; gap:6px; }
    .cat-group { margin-bottom:4px; }
    .cat-label { font-family:'Barlow Condensed',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--red); margin-bottom:6px; padding-left:2px; }
    .doc-row {
      display:flex; align-items:center; gap:12px;
      background:var(--card); border:1px solid var(--border);
      border-radius:7px; padding:12px 14px;
      text-decoration:none; color:var(--text);
      transition:border-color .15s, background .15s; margin-bottom:6px;
    }
    .doc-row:active { border-color:var(--red); background:var(--hit); }
    .doc-icon { width:34px; height:34px; background:var(--border); border-radius:5px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .doc-icon.pdf { background:#1a0800; }
    .doc-icon.web { background:#00101a; }
    .doc-icon.video { background:#0a001a; }
    .doc-icon svg { width:18px; height:18px; fill:var(--red); }
    .doc-icon.web svg { fill:#00aaff; }
    .doc-icon.video svg { fill:#cc44ff; }
    .doc-info { flex:1; min-width:0; }
    .doc-name { font-size:14px; font-weight:600; color:#eee; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .doc-sub { font-size:11px; color:var(--muted); margin-top:1px; }
    .arrow-icon { color:var(--muted); font-size:16px; }

    footer { background:var(--dark); border-top:1px solid var(--border); text-align:center; padding:12px; font-size:11px; color:#333; font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; }
  </style>
</head>

<script>
// ── SESSION GUARD ──────────────────────────────────────────────────────────
const raw = sessionStorage.getItem('stark_user');
if (!raw) { window.location.href = 'index.html'; }
const user = JSON.parse(raw || '{}');
document.getElementById('userName').textContent = (user.name||'').split(' ')[0].toUpperCase();

function logout() {
  sessionStorage.removeItem('stark_user');
  window.location.href = 'index.html';
}

// ── MODEL SELECTION ────────────────────────────────────────────────────────
let currentModel = sessionStorage.getItem('stark_model') || null;

function selectModel(modelKey, label) {
  currentModel = modelKey;
  sessionStorage.setItem('stark_model', modelKey);
  document.getElementById('modelOverlay').classList.add('hidden');
  document.getElementById('headerTitle').textContent = 'STARK VARG ' + label;
  document.getElementById('headerSub').textContent = 'Documentation — ' + label;
  document.getElementById('modelPillName').textContent = label;
  renderChips();
  renderAllDocs();
}

function changeModel() {
  document.getElementById('modelOverlay').classList.remove('hidden');
  document.getElementById('searchInput').value = '';
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('allDocsTitle').style.display = 'block';
  document.getElementById('allLinks').style.display = 'flex';
}

// Restore model if already set
if (currentModel) {
  selectModel(currentModel, currentModel);
}

function getDocsForModel(model) {
  return allDocs.filter(d => d.models.length === 0 || d.models.includes(model));
}

// ── SEARCH ────────────────────────────────────────────────────────────────
function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/['']/g,"'");
}

function search(q) {
  if (!q || q.trim().length < 2) return null;
  const docs = getDocsForModel(currentModel);
  const words = normalize(q.trim()).split(/\s+/);
  let best = null, bestScore = 0;
  for (const doc of docs) {
    let score = 0;
    const allTags = doc.tags.map(normalize);
    const titleN = normalize(doc.title);
    for (const w of words) {
      if (titleN.includes(w)) score += 3;
      for (const t of allTags) {
        if (t === w) score += 4;
        else if (t.includes(w) || w.includes(t)) score += 2;
      }
    }
    if (score > bestScore) { bestScore = score; best = doc; }
  }
  return bestScore > 0 ? best : null;
}

function renderResult(doc) {
  const box = document.getElementById('resultBox');
  if (!doc) {
    box.style.display = 'block';
    box.innerHTML = `<div class="no-result"><p>Aucun résultat pour <strong>"${document.getElementById('searchInput').value}"</strong><br><br>Essayez : suspension, frein, roue, batterie, huile, plastique…</p></div>`;
    return;
  }
  const linksHtml = doc.links.map(l => `
    <a class="result-link" href="${l.url}" target="_blank" rel="noopener">
      <div class="link-icon">${icons[l.icon]||icons.web}</div>
      <div class="link-meta">
        <span class="link-name">${l.name}</span>
        <span class="link-type">${l.type}</span>
      </div>
    </a>`).join('');
  box.style.display = 'block';
  box.innerHTML = `
    <div class="result-card">
      <div class="result-cat">${doc.cat}</div>
      <div class="result-title">${doc.title}</div>
      <div class="result-desc">${doc.desc}</div>
      <div class="result-links">${linksHtml}</div>
    </div>`;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('allDocsTitle').style.display = 'block';
  document.getElementById('allLinks').style.display = 'flex';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('searchInput').focus();
}

function quickSearch(kw) {
  document.getElementById('searchInput').value = kw;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', normalize(c.textContent).includes(normalize(kw)) || normalize(kw).includes(normalize(c.textContent)));
  });
  doSearch(kw);
}

function doSearch(query) {
  const clearBtn = document.getElementById('clearBtn');
  const allDocsTitle = document.getElementById('allDocsTitle');
  const allLinks = document.getElementById('allLinks');
  if (!query || query.trim().length < 2) {
    document.getElementById('resultBox').style.display = 'none';
    clearBtn.style.display = 'none';
    allDocsTitle.style.display = 'block';
    allLinks.style.display = 'flex';
    return;
  }
  clearBtn.style.display = 'flex';
  allDocsTitle.style.display = 'none';
  allLinks.style.display = 'none';
  renderResult(search(query));
}

document.getElementById('searchInput').addEventListener('input', function() {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  doSearch(this.value);
});

// ── RENDER ALL DOCS ────────────────────────────────────────────────────────
function renderAllDocs() {
  const docs = getDocsForModel(currentModel);
  const cats = {};
  for (const doc of docs) { if(!cats[doc.cat]) cats[doc.cat]=[]; cats[doc.cat].push(doc); }
  let html = '';
  for (const [cat, items] of Object.entries(cats)) {
    html += `<div class="cat-group"><div class="cat-label">${cat}</div>`;
    for (const doc of items) {
      const fl = doc.links[0];
      html += `<a class="doc-row" href="${fl.url}" target="_blank" rel="noopener">
        <div class="doc-icon ${fl.icon}">${icons[fl.icon]||icons.web}</div>
        <div class="doc-info">
          <div class="doc-name">${doc.title}</div>
          <div class="doc-sub">${doc.links.length > 1 ? doc.links.length+' liens' : fl.type}</div>
        </div>
        <span class="arrow-icon">›</span>
      </a>`;
    }
    html += '</div>';
  }
  document.getElementById('allLinks').innerHTML = html;
}
